<style>
/* Hide theme-provided header to avoid duplicate navbars */
header.site-header, header[role="banner"], .site-header, .site-header-inner, .header, .top-header { display: none !important; }

.navbar {
    background: #1e1e1e;
    overflow: hidden;
    display: flex;
    justify-content: center;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 6px;
}
.navbar a {
    color: #f2f2f2;
    text-align: center;
    padding: 10px 16px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    margin: 0 8px;
    border-radius: 4px;
    transition: background 0.3s;
}
.navbar a:hover {
    background-color: #333;
    color: white;
}

/* Copy button styles */
.code-container {
    position: relative;
    margin-top: 10px;
}
.code-container pre,
.cmd-preview,
.code-snippet,
.code-container code {
    background: #f6f8fa;
    padding: 12px;
    padding-right: 40px; /* Space for the button */
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.85em;
    overflow-x: auto;
    white-space: pre-wrap;
    color: #24292e;
    border: 1px solid #eaecef;
    margin-top: 0;
}
.copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #e1e4e8;
    border: 1px solid #d1d5da;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    color: #24292e;
    transition: background 0.2s;
    z-index: 10;
}
.copy-btn:hover { background: #d1d5da; }
.copy-btn:active { background: #c6cbd1; }
</style>

<div class="navbar">
  <a href="index.html">🏠 Home</a>
  <a href="extensions.html">🧩 Extensions & Skills</a>
  <a href="https://github.com/sheldonrobinson/ai-backend" target="_blank">📦 Repo</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    var seen = new Set();
    // collect candidate blocks: existing preview classes and fenced code blocks
    var candidates = Array.from(document.querySelectorAll('.cmd-preview, .code-snippet'));
    // include pre>code (fenced code blocks)
    Array.prototype.push.apply(candidates, Array.from(document.querySelectorAll('pre > code')));

    candidates.forEach(function(node) {
        // target element to wrap: for pre>code use the parent PRE
        var target = (node.tagName === 'CODE' && node.parentNode && node.parentNode.tagName === 'PRE') ? node.parentNode : node;
        if (seen.has(target)) return;
        seen.add(target);

        // If not already wrapped, wrap in .code-container
        if (!target.classList.contains('code-container')) {
            var wrapper = document.createElement('div');
            wrapper.className = 'code-container';
            target.parentNode.insertBefore(wrapper, target);
            wrapper.appendChild(target);
            target = wrapper;
        }

        // Avoid adding multiple buttons
        if (target.querySelector('.copy-btn')) return;

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerText = 'Copy';

        btn.addEventListener('click', function() {
            var codeToCopy = '';
            // prefer .cmd-preview inside container
            var preview = target.querySelector('.cmd-preview');
            if (preview) {
                codeToCopy = preview.innerText;
            } else {
                var pre = target.querySelector('pre');
                if (pre) codeToCopy = pre.innerText;
                else codeToCopy = target.innerText;
            }
            if (!navigator.clipboard) {
                // fallback
                var ta = document.createElement('textarea');
                ta.value = codeToCopy.trim();
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); btn.innerText = 'Copied!'; } catch (e) { alert('Copy failed'); }
                document.body.removeChild(ta);
                setTimeout(function(){ btn.innerText = 'Copy'; }, 2000);
                return;
            }
            navigator.clipboard.writeText(codeToCopy.trim()).then(function() {
                btn.innerText = 'Copied!';
                setTimeout(function() { btn.innerText = 'Copy'; }, 2000);
            });
        });

        target.appendChild(btn);
    });
});
</script>
